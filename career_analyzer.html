<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>履歷分析器 — 升學 & 求職顧問</title>
<style>
  :root {
    --bg: #F7F4F0;
    --surface: #FFFFFF;
    --surface2: #F2EDE8;
    --border: #E0D8CF;
    --accent: #8B6F47;
    --accent2: #6B8F71;
    --accent3: #C4956A;
    --text: #2C1F14;
    --text2: #7A6552;
    --text3: #A8917A;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'Noto Sans TC', system-ui, sans-serif; min-height: 100vh; }

  header {
    background: #FFFFFF;
    border-bottom: 1px solid var(--border);
    padding: 22px 36px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 1px 8px rgba(139,111,71,0.07);
  }
  header .logo { font-size: 26px; }
  header h1 { font-size: 19px; font-weight: 700; color: var(--text); letter-spacing: 0.3px; }
  header p { font-size: 12px; color: var(--text3); margin-top: 3px; letter-spacing: 0.3px; }

  .container { max-width: 960px; margin: 0 auto; padding: 32px 20px 80px; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(139,111,71,0.06);
  }
  .card-title {
    font-size: 15px; font-weight: 700; margin-bottom: 22px; color: var(--text);
    display: flex; align-items: center; gap: 10px;
  }
  .card-title .dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .form-grid.full { grid-template-columns: 1fr; }
  .field { display: flex; flex-direction: column; gap: 7px; }
  .field label { font-size: 11px; color: var(--text2); font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; }
  .field input, .field select, .field textarea {
    background: var(--surface2); border: 1.5px solid var(--border); border-radius: 9px;
    color: var(--text); font-size: 14px; padding: 10px 13px; outline: none;
    font-family: inherit; resize: vertical; transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: #fff; }
  .field textarea { min-height: 80px; }
  .field select option { background: #fff; }
  .field input::placeholder, .field textarea::placeholder { color: var(--text3); }

  .section-label {
    font-size: 10px; color: var(--accent); font-weight: 800; letter-spacing: 1.5px;
    text-transform: uppercase; margin: 24px 0 14px; padding-bottom: 7px;
    border-bottom: 1.5px solid var(--border);
  }

  /* Tag input */
  .tag-input-wrap {
    background: var(--surface2); border: 1.5px solid var(--border); border-radius: 9px;
    padding: 8px 10px; display: flex; flex-wrap: wrap; gap: 6px; cursor: text;
    min-height: 44px; align-items: flex-start; transition: border-color 0.2s;
  }
  .tag-input-wrap:focus-within { border-color: var(--accent); background: #fff; }
  .tag {
    background: var(--accent); color: #fff; border-radius: 6px;
    padding: 3px 10px; font-size: 13px; display: flex; align-items: center; gap: 5px;
  }
  .tag .rm { cursor: pointer; opacity: 0.7; font-size: 15px; line-height: 1; }
  .tag .rm:hover { opacity: 1; }
  .tag-input-wrap input {
    background: transparent; border: none; outline: none; color: var(--text);
    font-size: 14px; flex: 1; min-width: 80px; padding: 2px 0;
  }
  .tag-input-wrap input::placeholder { color: var(--text3); }

  /* Analyze button */
  .analyze-btn {
    width: 100%; padding: 15px; background: var(--accent);
    border: none; border-radius: var(--radius); color: #fff; font-size: 15px;
    font-weight: 700; cursor: pointer; margin-top: 6px; letter-spacing: 0.5px;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 3px 12px rgba(139,111,71,0.25);
  }
  .analyze-btn:hover { background: #7a5f3a; transform: translateY(-1px); box-shadow: 0 5px 16px rgba(139,111,71,0.3); }
  .analyze-btn:active { transform: translateY(0); }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Results */
  .results-card { display: none; }
  .results-card.show { display: block; }

  .tabs { display: flex; gap: 6px; margin-bottom: 0; }
  .tab-btn {
    flex: 1; padding: 12px 8px; background: var(--surface2); border: 1.5px solid var(--border);
    border-bottom: none; border-radius: 11px 11px 0 0; color: var(--text2);
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    text-align: center; font-family: inherit;
  }
  .tab-btn:hover { color: var(--text); background: #EDE8E2; }
  .tab-btn.active { background: var(--surface); color: var(--accent); border-color: var(--border); border-bottom-color: #fff; font-weight: 700; }

  .tab-content {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 0 0 var(--radius) var(--radius); padding: 28px; min-height: 300px;
  }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* Loading */
  .loading {
    display: flex; align-items: center; gap: 12px; color: var(--text3); font-size: 14px;
    padding: 50px 0; justify-content: center;
  }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-msg {
    background: #FDF0EE; border: 1.5px solid #E8C4BC; border-radius: 10px;
    padding: 14px 18px; color: #9B4733; font-size: 14px; margin-top: 16px;
  }

  /* Markdown rendering */
  .md { font-size: 14px; line-height: 1.85; color: var(--text); }
  .md h2 {
    font-size: 16px; color: var(--accent); margin: 24px 0 10px; font-weight: 800;
    padding-bottom: 8px; border-bottom: 1.5px solid var(--border);
  }
  .md h2:first-child { margin-top: 0; }
  .md h3 { font-size: 14px; color: var(--text); margin: 16px 0 7px; font-weight: 700; }
  .md p { margin-bottom: 10px; color: var(--text); }
  .md ul { padding-left: 20px; margin-bottom: 10px; }
  .md ol { padding-left: 20px; margin-bottom: 10px; }
  .md li { margin-bottom: 5px; }
  .md strong { color: var(--accent); font-weight: 700; }
  .md em { color: var(--accent2); font-style: normal; font-weight: 600; }
  .md hr { border: none; border-top: 1.5px solid var(--border); margin: 20px 0; }
  .md blockquote {
    border-left: 3px solid var(--accent3); padding: 10px 16px;
    background: #FBF7F3; border-radius: 0 8px 8px 0; margin: 12px 0; color: var(--text2);
  }

  /* School / Job cards in result */
  .result-card {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 11px; padding: 16px 18px; margin: 12px 0;
  }
  .result-card .badge {
    display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px;
    border-radius: 20px; margin-bottom: 8px; letter-spacing: 0.5px;
  }
  .badge-dream { background: #F5E8D8; color: #8B5A2B; }
  .badge-target { background: #E0EDE2; color: #3D7047; }
  .badge-safe { background: #E8EAF5; color: #3D4E8B; }
  .cost-row {
    display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px;
    background: #fff; border-radius: 8px; padding: 10px 14px;
    border: 1px solid var(--border);
  }
  .cost-item { font-size: 12px; color: var(--text2); }
  .cost-item strong { color: var(--accent); font-size: 13px; display: block; margin-bottom: 2px; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    header { padding: 16px 20px; }
    .card { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🎓</div>
  <div>
    <h1>履歷分析器</h1>
    <p>AI 驅動的升學 & 求職顧問｜台灣研究所 · 台灣職缺 · 美國碩士</p>
  </div>
</header>

<div class="container">


  <!-- Resume Form -->
  <div class="card">
    <div class="card-title"><div class="dot"></div>填寫你的學經歷</div>

    <div class="section-label">學歷</div>
    <div class="form-grid">
      <div class="field">
        <label>目前最高學歷</label>
        <select id="edu_level">
          <option value="高中">高中 / 高職</option>
          <option value="大學在讀">大學在讀</option>
          <option value="大學畢業" selected>大學畢業</option>
          <option value="碩士在讀">碩士在讀</option>
          <option value="碩士畢業">碩士畢業</option>
        </select>
      </div>
      <div class="field">
        <label>就讀 / 畢業學校</label>
        <input type="text" id="edu_school" placeholder="例：國立台灣大學" />
      </div>
      <div class="field">
        <label>科系</label>
        <input type="text" id="edu_dept" placeholder="例：資訊工程學系" />
      </div>
      <div class="field">
        <label>GPA（選填）</label>
        <input type="text" id="edu_gpa" placeholder="例：3.8 / 4.0 或 85 分" />
      </div>
      <div class="field">
        <label>系排名 %（非常重要）</label>
        <input type="text" id="edu_rank" placeholder="例：前 40%、前 10%、後 30%" />
      </div>
    </div>

    <div class="section-label">語言能力</div>
    <div class="form-grid">
      <div class="field">
        <label>英文程度</label>
        <select id="lang_en">
          <option value="無">無考試成績</option>
          <option value="多益600以下">多益 600 以下</option>
          <option value="多益600-750">多益 600–750</option>
          <option value="多益750-900">多益 750–900</option>
          <option value="多益900以上">多益 900 以上</option>
          <option value="托福80以下">托福 80 以下</option>
          <option value="托福80-99">托福 80–99</option>
          <option value="托福100以上">托福 100 以上</option>
          <option value="雅思6以下">雅思 6.0 以下</option>
          <option value="雅思6-7">雅思 6.0–7.0</option>
          <option value="雅思7以上">雅思 7.0 以上</option>
        </select>
      </div>
      <div class="field">
        <label>其他語言（選填）</label>
        <input type="text" id="lang_other" placeholder="例：日文 N2、韓文初級" />
      </div>
    </div>

    <div class="section-label">工作 & 實習經驗</div>
    <div class="form-grid full">
      <div class="field">
        <label>工作 / 實習經歷（每行一筆，格式：公司 · 職位 · 年資）</label>
        <textarea id="work_exp" placeholder="例：
台積電 · 製程整合工程師 · 2年
鴻海 · 軟體實習生 · 6個月"></textarea>
      </div>
    </div>

    <div class="section-label">技能</div>
    <div class="form-grid full">
      <div class="field">
        <label>技術技能（按 Enter 新增標籤）</label>
        <div class="tag-input-wrap" id="skills_wrap" onclick="document.getElementById('skills_input').focus()">
          <input id="skills_input" placeholder="輸入技能後按 Enter" />
        </div>
      </div>
    </div>

    <div class="section-label">研究 & 作品</div>
    <div class="form-grid full">
      <div class="field">
        <label>研究主題 / 論文 / 作品集（簡述）</label>
        <textarea id="research" placeholder="例：大學專題研究自然語言處理，發表於 ICDM 2024；個人開發了一個 SaaS 記帳工具…"></textarea>
      </div>
    </div>

    <div class="section-label">目標 & 備註</div>
    <div class="form-grid">
      <div class="field">
        <label>感興趣的領域 / 方向</label>
        <input type="text" id="interest" placeholder="例：AI、金融科技、半導體、產品管理" />
      </div>
      <div class="field">
        <label>預算或特別考量（選填）</label>
        <input type="text" id="budget" placeholder="例：希望就讀公費，或月支出不超過 3 萬" />
      </div>
    </div>

    <div style="margin-top: 24px;">
      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">🔍 開始全面分析</button>
    </div>
  </div>

  <!-- Results -->
  <div class="card results-card" id="resultsCard">
    <div class="card-title"><div class="dot" style="background:var(--accent2)"></div>分析結果</div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(0)">🎓 台灣研究所</button>
      <button class="tab-btn" onclick="switchTab(1)">🏢 台灣職缺</button>
      <button class="tab-btn" onclick="switchTab(2)">✈️ 美國碩士</button>
    </div>
    <div class="tab-content">
      <div class="tab-pane active md" id="pane0"><div class="loading"><div class="spinner"></div>分析中，請稍候…</div></div>
      <div class="tab-pane md" id="pane1"><div class="loading"><div class="spinner"></div>分析中，請稍候…</div></div>
      <div class="tab-pane md" id="pane2"><div class="loading"><div class="spinner"></div>分析中，請稍候…</div></div>
    </div>
  </div>

</div>

<script>
// --- Tag input ---
const skillTags = [];
const skillsInput = document.getElementById('skills_input');
skillsInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = skillsInput.value.trim();
    if (val && !skillTags.includes(val)) {
      skillTags.push(val);
      renderTags();
    }
    skillsInput.value = '';
  } else if (e.key === 'Backspace' && skillsInput.value === '' && skillTags.length) {
    skillTags.pop();
    renderTags();
  }
});
function renderTags() {
  const wrap = document.getElementById('skills_wrap');
  wrap.querySelectorAll('.tag').forEach(t => t.remove());
  skillTags.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'tag';
    el.innerHTML = `${t}<span class="rm" onclick="removeTag(${i})">×</span>`;
    wrap.insertBefore(el, skillsInput);
  });
}
function removeTag(i) { skillTags.splice(i, 1); renderTags(); }


// --- Tabs ---
function switchTab(i) {
  document.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', i === j));
  document.querySelectorAll('.tab-pane').forEach((p, j) => p.classList.toggle('active', i === j));
}

// --- Collect resume ---
function collectResume() {
  return {
    edu_level: document.getElementById('edu_level').value,
    edu_school: document.getElementById('edu_school').value,
    edu_dept: document.getElementById('edu_dept').value,
    edu_gpa: document.getElementById('edu_gpa').value,
    edu_rank: document.getElementById('edu_rank').value,
    lang_en: document.getElementById('lang_en').value,
    lang_other: document.getElementById('lang_other').value,
    work_exp: document.getElementById('work_exp').value,
    skills: skillTags.join(', '),
    research: document.getElementById('research').value,
    interest: document.getElementById('interest').value,
    budget: document.getElementById('budget').value,
  };
}

function resumeText(r) {
  return `
學歷：${r.edu_level}，${r.edu_school} ${r.edu_dept}${r.edu_gpa ? `，GPA ${r.edu_gpa}` : ''}${r.edu_rank ? `，系排 ${r.edu_rank}` : ''}
英文能力：${r.lang_en}${r.lang_other ? `；其他語言：${r.lang_other}` : ''}
工作/實習經歷：
${r.work_exp || '（無）'}
技術技能：${r.skills || '（未填）'}
研究/作品：${r.research || '（無）'}
感興趣領域：${r.interest || '（未指定）'}
預算考量：${r.budget || '（未指定）'}
  `.trim();
}

// --- Prompts ---
const PROMPTS = {
  tw_grad: (resume) => `你是一位深耕台灣學術圈十年的研究所申請顧問，曾協助數百位學生申請，對各校系實際錄取標準有精準掌握。你的分析風格：誠實、精準、有溫度，不說空話，給出具體可執行的建議。

【台灣研究所實際錄取門檻（根據近三年實際錄取統計）】
▸ 台大電機/資工/電信：私立大學幾乎無法上榜，國立大學需系排前 10% 以上
▸ 清大/交大電機資工：國立大學系排前 15%，私立大學需系排前 3-5%（且須有研究成果/競賽加持）
▸ 成大電機/資工：國立大學系排前 20-25%，私立需前 8-12%
▸ 中央/中山/中興：國立大學系排前 35%，私立需前 15-25%
▸ 元智/中原/淡江/逢甲：私立學生系排 40% 以內可合理評估
▸ 輔仁/銘傳/東吳碩士：系排 50% 以上可考慮（依科系不同）

【特別注意】
- 私立大學學生（如：元智、中原、逢甲、銘傳等）申請台清交成電資所，若系排在 20% 以上，錄取機率低於 5%，請如實告知
- 若有研究發表、競賽得獎、實習強化，可提升約一個等級
- 推甄管道比考試分發競爭更激烈，請分開評估

---
申請者履歷：
${resume}
---

請以以下 Markdown 格式輸出詳細分析：

## 📊 競爭力誠實評估

從以下三個面向分析：
1. **學歷定位**：學校背景在台灣研究所市場的客觀評價
2. **系排關鍵指標**：系排對照各校系錄取機率的現實分析（請給出具體百分比）
3. **加分/扣分因素**：研究經歷、語言能力、競賽、實習等對申請的影響

## 🏆 推薦研究所清單

### 🌟 衝刺校（建議 1–2 所，錄取率低但值得嘗試）
對每所學校：
- **學校 + 系所**（如：成功大學電機工程研究所）
- 實際錄取門檻 vs 申請者條件差距分析
- 錄取機率評估（如：8–12%）
- 如何提高勝算的具體建議
- 💰 就讀費用：學費/年 + 台南/台北/新竹月生活費 + **年總花費**

### ✅ 目標校（建議 2–3 所，有合理勝算）
同上格式

### 🛡️ 穩上校（建議 1–2 所，高機率錄取）
同上格式

---

## 💡 備審資料 & 面試準備

針對這位申請者的具體建議：
- 備審資料的重點方向（SOP 如何呈現、要突出哪些經歷）
- 面試可能被問的問題與建議回答方向
- 放榜前的準備行動清單`,

  tw_job: (resume) => `你是一位熟悉台灣就業市場的職涯顧問，專精於電子、半導體、科技、軟體產業，了解各大公司的實際薪資結構與文化。你的分析要具體、現實，給出這位申請者「現在就能採取行動」的建議。

申請者履歷：
${resume}

---
請以以下 Markdown 格式輸出：

## 📊 職涯競爭力分析

1. **市場定位**：這位申請者目前在台灣就業市場的客觀位置
2. **核心競爭力**：最有優勢的 3 項技能/經驗，以及市場稀缺性
3. **需要補強的缺口**：誠實指出目前阻礙更高薪資/職位的關鍵弱點

---

## 💼 最適合的職位方向（3–5 種）

每種職位類型：
- **職位名稱**（如：IC 設計工程師 / 韌體工程師 / 數位行銷）
- 申請者符合度（%）與說明
- 這類職位在台灣的市場需求度（高/中/低）

---

## 🏢 推薦公司清單（依競爭激烈程度分三層）

### 🔥 頂尖企業（競爭激烈，但值得投）
列出 3–4 家，每家包含：
- **公司名稱**（產業別：如半導體/雲端/IC 設計）
- 最適合的職位

// --- Call Groq via local Flask backend (streaming) ---
async function callClaude(prompt, paneId) {
  const pane = document.getElementById(paneId);
  pane.innerHTML = '<div class="loading"><div class="spinner"></div>AI 分析中…</div>';

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });

    if (!res.ok) {
      const err = await res.json();
      pane.innerHTML = `<div class="error-msg">❌ 錯誤：${err.error || res.statusText}</div>`;
      return;
    }

    pane.innerHTML = '';
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // 保留不完整的最後一行
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const parsed = JSON.parse(data);
            const text = parsed.choices?.[0]?.delta?.content;
            if (text) {
              fullText += text;
              pane.innerHTML = renderMd(fullText);
            }
          } catch {}
        }
      }
    }
    if (!fullText) pane.innerHTML = '<div class="error-msg">未收到回應，請重試。</div>';

  } catch (e) {
    pane.innerHTML = `<div class="error-msg">❌ 連線錯誤：${e.message}</div>`;
  }
}

// --- Simple Markdown renderer ---
function renderMd(text) {
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hublp]|<\/[hublp]|<hr)(.+)$/gm, (m, p1) => p1.trim() ? `<p>${p1}</p>` : '');
  return html;
}

// --- Main analyze ---
async function analyze() {
  const r = collectResume();
  if (!r.edu_school && !r.work_exp && skillTags.length === 0) {
    alert('請至少填寫學校、工作經歷或技能');
    return;
  }

  const resume = resumeText(r);
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 分析中…';

  // Show results card
  const rc = document.getElementById('resultsCard');
  rc.classList.add('show');
  rc.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // Reset panes
  for (let i = 0; i < 3; i++) {
    document.getElementById(`pane${i}`).innerHTML =
      '<div class="loading"><div class="spinner"></div>等待分析…</div>';
  }

  switchTab(0);

  // Run 3 analyses in parallel
  await Promise.all([
    callClaude(PROMPTS.tw_grad(resume), 'pane0'),
    callClaude(PROMPTS.tw_job(resume), 'pane1'),
    callClaude(PROMPTS.us_grad(resume), 'pane2'),
  ]);

  btn.disabled = false;
  btn.textContent = '🔍 重新分析';
}
